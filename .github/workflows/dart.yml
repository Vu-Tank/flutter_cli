name: Flutter CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, closed]

jobs:
  quality:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          pub-cache-key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze changed files & check dead code
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
          else
            BASE_REF="${{ github.event.before }}"
          fi

          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "$BASE_REF"...HEAD | grep '.dart$' | grep -v '.g.dart$' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed Dart files to analyze."
            exit 0
          fi

          echo "$CHANGED_FILES"
          flutter analyze --fatal-warnings --no-fatal-infos $CHANGED_FILES

      # - name: Run tests
      #   run: flutter test

  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          pub-cache-key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Check pubspec version changed
        id: version_check
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          echo "BASE_SHA=$BASE_SHA"
          echo "HEAD_SHA=$HEAD_SHA"

          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Initial push or missing base commit, skip version comparison."
            exit 0
          fi

          git fetch --no-tags origin "$BASE_SHA" "$HEAD_SHA" || true

          base_version=$(git show "$BASE_SHA:pubspec.yaml" | sed -n 's/^version:[[:space:]]*//p' | head -n 1)
          head_version=$(git show "$HEAD_SHA:pubspec.yaml" | sed -n 's/^version:[[:space:]]*//p' | head -n 1)

          echo "base_version=$base_version"
          echo "head_version=$head_version"

          if [[ -n "$base_version" && -n "$head_version" && "$base_version" != "$head_version" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $base_version -> $head_version"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: $base_version -> $head_version"
          fi
      - name: Decode Firebase service account
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" | base64 --decode > firebase.json

      - name: Build APK
        if: steps.version_check.outputs.changed == 'true'
        run: flutter build appbundle --release

      - name: Upload AAB to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFile: firebase.json
          groups: internal
          file: build/app/outputs/bundle/release/app-release.aab
          releaseNotes: |
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
